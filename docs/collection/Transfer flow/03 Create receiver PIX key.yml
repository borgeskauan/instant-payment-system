info:
  name: 03 Create receiver PIX key
  type: http
  seq: 1

http:
  method: post
  url: "{{receiverPspUrl}}/customers/{{receiverCustomerId}}/pix-keys"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "pixKey": "{{receiverPixKey}}"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
