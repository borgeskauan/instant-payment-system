info:
  name: 02 Create receiver customer
  type: http
  seq: 2

http:
  method: post
  url: "{{receiverPspUrl}}/customers"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Bob",
        "taxId": "22222222222"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setVar("receiverCustomerId", res.body.customer.id);

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
