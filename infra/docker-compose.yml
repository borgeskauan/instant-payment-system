x-common-healthcheck: &default-healthcheck
  interval: 5s
  timeout: 5s
  retries: 12

x-low-resource: &low-resource
  mem_swappiness: 0

services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    cpus: 0.50
    mem_limit: 512m
    mem_reservation: 384m
    memswap_limit: 512m
    <<: *low-resource
    environment:
      - POSTGRES_PASSWORD=mysecretpassword
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.max=10000
      - -c
      - track_io_timing=on
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: pg_isready -U postgres || exit 1
      <<: *default-healthcheck

  postgres-statements-init:
    image: postgres:17-alpine
    container_name: postgres-statements-init
    environment:
      - PGPASSWORD=mysecretpassword
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        set -e
        psql -h postgres -U postgres -d postgres -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;"
        psql -h postgres -U postgres -d postgres -v ON_ERROR_STOP=1 -c "ALTER SYSTEM SET pg_stat_statements.track = 'none';"
        psql -h postgres -U postgres -d postgres -v ON_ERROR_STOP=1 -c "SELECT pg_reload_conf();"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: kafka
    cpus: 0.80
    mem_limit: 1024m
    mem_reservation: 768m
    memswap_limit: 1024m
    <<: *low-resource
    ports:
      - "9092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: CONTAINER_INTERNAL://${KAFKA_BOOTSTRAP_SERVERS},HOST://0.0.0.0:29092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: CONTAINER_INTERNAL://${KAFKA_BOOTSTRAP_SERVERS},HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTAINER_INTERNAL:PLAINTEXT,HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: CONTAINER_INTERNAL
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_LOG_RETENTION_MS: 600000
      KAFKA_LOG_RETENTION_BYTES: 268435456
      KAFKA_LOG_SEGMENT_BYTES: 33554432
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 30000
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: nc -z kafka ${KAFKA_PORT} || exit 1
      <<: *default-healthcheck

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        set -euo pipefail

        ensure_topic() {
          local topic="$1"
          local partitions="$2"

          kafka-topics --bootstrap-server ${KAFKA_BOOTSTRAP_SERVERS} --create --if-not-exists --topic "$$topic" --partitions "$$partitions" --replication-factor 1

          local current_partitions
          current_partitions="$$(kafka-topics --bootstrap-server ${KAFKA_BOOTSTRAP_SERVERS} --describe --topic "$$topic" | awk -F'PartitionCount: ' '/PartitionCount:/ { split($$2, parts, " "); print parts[1]; exit }')"
          if (( current_partitions < partitions )); then
            kafka-topics --bootstrap-server ${KAFKA_BOOTSTRAP_SERVERS} --alter --topic "$$topic" --partitions "$$partitions"
          fi
        }

        ensure_topic spi-payment-requests 8
        ensure_topic spi-payment-status-reports 8
        ensure_topic psp-notifications 8

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    profiles:
      - ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: kraft-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    depends_on:
      kafka:
        condition: service_healthy

  notification-gateway:
    build:
      context: ../notification-gateway
      dockerfile: Dockerfile
    container_name: notification-gateway
    cpus: 0.25
    mem_limit: 320m
    mem_reservation: 192m
    memswap_limit: 320m
    <<: *low-resource
    ports:
      - "9090:9090"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      NOTIFICATION_GATEWAY_KAFKA_LISTENER_CONCURRENCY: ${NOTIFICATION_GATEWAY_KAFKA_LISTENER_CONCURRENCY:-2}
      JAVA_TOOL_OPTIONS: "-Xms96m -Xmx160m -XX:MaxDirectMemorySize=48m -Xss256k"
    depends_on:
      kafka-init:
        condition: service_completed_successfully


  spi:
    build:
      context: ../spi
      dockerfile: Dockerfile
    container_name: spi
    cpus: 0.80
    mem_limit: 768m
    mem_reservation: 512m
    memswap_limit: 768m
    mem_swappiness: 0
    ports:
      - "8002:8002"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      JAVA_TOOL_OPTIONS: "-Xms384m -Xmx512m"
      SPI_TRACE_FILE: /tmp/spi-trace.csv
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      postgres-statements-init:
        condition: service_completed_successfully

  kafka-producer:
    build:
      context: ../kafka-producer
      dockerfile: Dockerfile
    container_name: kafka-producer
    cpus: 0.55
    mem_limit: 384m
    mem_reservation: 256m
    memswap_limit: 384m
    <<: *low-resource
    ports:
      - "8001:8001"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m -XX:MaxRAMPercentage=75 -Dreactor.netty.ioWorkerCount=1"
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: prometheus
    profiles:
      - observability
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "9091:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - cadvisor
      - node-exporter
      - kafka-exporter
      - postgres-exporter

  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    profiles:
      - observability
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  cadvisor:
    image: ghcr.io/google/cadvisor:v0.57.0
    container_name: cadvisor
    profiles:
      - observability
    command:
      - --docker_only=true
    privileged: true
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    profiles:
      - observability
    command:
      - --path.rootfs=/host
    pid: host
    ports:
      - "9100:9100"
    volumes:
      - /:/host:ro,rslave

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: kafka-exporter
    profiles:
      - observability
    command:
      - --kafka.server=kafka:9092
    ports:
      - "9308:9308"
    depends_on:
      kafka:
        condition: service_healthy

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    profiles:
      - observability
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:mysecretpassword@postgres:5432/postgres?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  prometheus-data:
