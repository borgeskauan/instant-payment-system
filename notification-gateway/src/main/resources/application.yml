spring:
  application:
    name: notification-gateway

  main:
    web-application-type: none   # gRPC server only — no HTTP servlet container

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-gateway-group
      auto-offset-reset: earliest

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:mysecretpassword}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    table: notification_gateway_flyway_schema_history
    baseline-on-migrate: true
    baseline-version: 0

grpc:
  server:
    port: 9090
    security:
      enabled: true
      certificate-chain: ${GRPC_SERVER_SECURITY_CERTIFICATE_CHAIN:file:/certs/gateway/server.crt}
      private-key: ${GRPC_SERVER_SECURITY_PRIVATE_KEY:file:/certs/gateway/server.key}
      trust-cert-collection: ${GRPC_SERVER_SECURITY_TRUST_CERT_COLLECTION:file:/certs/ca/ca.crt}
      client-auth: REQUIRE

notification-gateway:
  kafka:
    listener-concurrency: ${NOTIFICATION_GATEWAY_KAFKA_LISTENER_CONCURRENCY:2}
  delivery:
    worker-delay-ms: ${NOTIFICATION_GATEWAY_DELIVERY_WORKER_DELAY_MS:250}
    batch-size: ${NOTIFICATION_GATEWAY_DELIVERY_BATCH_SIZE:100}
    dispatch-concurrency: ${NOTIFICATION_GATEWAY_DELIVERY_DISPATCH_CONCURRENCY:8}
    lease-duration-ms: ${NOTIFICATION_GATEWAY_DELIVERY_LEASE_DURATION_MS:30000}
    retry-delay-ms: ${NOTIFICATION_GATEWAY_DELIVERY_RETRY_DELAY_MS:1000}
