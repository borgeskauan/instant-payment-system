spring:
  application:
    name: notification-gateway

  main:
    web-application-type: none   # gRPC server only — no HTTP servlet container

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-gateway-group
      auto-offset-reset: earliest

grpc:
  server:
    port: 9090
