syntax = "proto3";

option java_package = "br.kauan.notificationgateway.grpc.proto";
option java_outer_classname = "NotificationProto";
option java_multiple_files = true;

package notification;

// A client subscribes with its ISPB and receives a stream of notifications
// routed to that ISPB.
service NotificationGateway {
  rpc StreamNotifications(StreamRequest) returns (stream NotificationBatch);
}

// The ISPB identifies which PSP wants to receive notifications.
message StreamRequest {
  string ispb = 1;
}

// A batch of notifications forwarded from the internal Kafka topic.
// - payloads: raw notification bodies. For the current API version these are
//             application/json; charset=utf-8, but the gateway treats them as
//             opaque bytes and does not parse or validate the body.
message NotificationBatch {
  repeated bytes payloads = 1;
}
