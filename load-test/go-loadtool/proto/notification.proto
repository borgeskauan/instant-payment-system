syntax = "proto3";

option go_package = "instant-payment-system/load-test/go-loadtool/internal/gen/notificationpb";

package notification;

service NotificationGateway {
  rpc StreamNotifications(StreamRequest) returns (stream NotificationBatch);
}

message StreamRequest {
  string ispb = 1;
}

message NotificationBatch {
  repeated bytes payloads = 1;
}
