spring:
  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: spi_flyway_schema_history
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: mysecretpassword
    hikari:
      connection-timeout: 3000
      validation-timeout: 1000

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
  jmx:
    enabled: false
  main:
    lazy-initialization: false
    web-application-type: reactive

spi:
  default-initial-balance: 1_000_000_000
  kafka:
    listener-concurrency: 3
    payment-request-group-id: spi-payment-request-consumer-group
    status-report-group-id: spi-status-report-consumer-group
    max-poll-records: 500
    fetch-min-bytes: 1024
    fetch-max-wait-ms: 10
    force-unknown-processing-error: false
  trace:
    file: /tmp/spi-trace.csv
    queue-capacity: 8192
    flush-interval-ms: 250
    batch-size: 1024
    sample-rate: 100

server:
  port: 8002
